<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#F8FAF8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Preconnect to Firebase and Google APIs -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://www.googleapis.com" />
    
    <!-- DNS prefetch for WhatsApp -->
    <link rel="dns-prefetch" href="https://wa.me" />
    
    <!-- Preload logo (used in preloader) -->
    <link rel="preload" as="image" href="/logo.webp" type="image/webp" />
    
    <title>Vital Agro Chemical Industries (Pvt.) Ltd. | Premium Agricultural Solutions</title>
    <meta name="description" content="Vital Agro Chemical Industries - Premium Crop Protection, Plant Nutrition & Modern Agricultural Solutions. Insecticides, Herbicides, Fungicides, Growth Promoters." />
    <meta property="og:title" content="Vital Agro Chemical Industries (Pvt.) Ltd." />
    <meta property="og:description" content="Premium Crop Protection, Plant Nutrition & Modern Agricultural Solutions for progressive farmers." />
    <meta property="og:type" content="website" />
    
    <!-- Network Optimization: Preconnect & DNS Prefetch to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Performance Optimization: Non-blocking Font Loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&family=Noto+Nastaliq+Urdu:wght@400..700&family=Noto+Sans+Arabic:wght@100..900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&family=Noto+Nastaliq+Urdu:wght@400..700&family=Noto+Sans+Arabic:wght@100..900&display=swap" />
    </noscript>
    <style>
      html, body {
        background-color: #F8FAF8 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
